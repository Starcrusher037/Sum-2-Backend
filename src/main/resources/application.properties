spring.application.name=LearningPlatform

# Configuración H2
spring.datasource.url=jdbc:h2:mem:learningplatformdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Habilitar consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Permitir carga de scripts SQL al iniciar
spring.sql.init.mode=always

# Indica a Spring que primero cree las tablas (JPA/Hibernate) antes de ejecutar scripts SQL como data.sql
spring.jpa.defer-datasource-initialization=true